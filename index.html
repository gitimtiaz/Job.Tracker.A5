<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Google Font -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
    </style>

    <!-- font awasome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- DaisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font CSS -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC]  flex items-center justify-center min-h-screen">
    <section class="w-[350px] bg-white rounded-xl shadow-md p-6 text-center">
        
        <!-- Top Part -->
        <div class="mb-5">
            <img src="./assets/github-logo.png" class="w-16 mx-auto mb-3" alt="">
            <h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-gray-400 text-sm">Sign in to manage your issues</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-4">
            <div class="text-left">
                <label class="text-sm font-medium">Username</label>
                <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full mt-1" />
                <p class="text-xs text-[#4A00FF] mt-1">Default: admin</p>
            </div>
            <div class="text-left">
                <label class="text-sm font-medium">Password</label>
                <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full mt-1" />
                <p class="text-xs text-[#4A00FF] mt-1">Default: admin123</p>
            </div>

            <!-- signin btn -->
            <button type="submit" class="w-full py-2 rounded-lg text-white font-medium bg-[#4A00FF]">
                Sign In
            </button>
        </form>
        <!-- or div -->
        <div class="flex items-center my-5 text-sm">
            <div class="flex-grow h-px bg-gray-200"></div>
            <span class="px-3">OR</span>
            <div class="flex-grow h-px bg-gray-200"></div>
        </div>

        <!-- Demo credentials -->
        <p class="font-medium text-sm text-gray-400 mb-2">Demo Credentials:</p>
        <div class="bg-gray-100 rounded-lg p-3 text-sm">
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
        </div>
    </section>

    <!-- Js connect -->
    <script src="./script.js"></script>
</body>
</html>
